<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOMADIK SYSTEMS | Lead Architect</title>
    <style>
        :root { --gold: #d4af37; --black: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { background-color: var(--black); color: var(--text); font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--gray); border: 1px solid var(--gold); padding: 40px; border-radius: 2px; max-width: 600px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        .logo-placeholder { width: 80px; height: 80px; border: 2px solid var(--gold); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        h1 { color: var(--gold); letter-spacing: 4px; font-weight: 200; text-transform: uppercase; margin-bottom: 10px; font-size: 1.5rem; }
        p { color: #888; line-height: 1.8; font-size: 0.9rem; margin-bottom: 30px; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid #333; padding-top: 30px; }
        .stat-item { text-align: left; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: var(--gold); letter-spacing: 1px; }
        .value { font-size: 0.8rem; color: #fff; margin-top: 5px; }
        .btn { display: inline-block; margin-top: 40px; padding: 12px 30px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: var(--black); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-placeholder">NS</div>
        <h1>Nomadik Systems</h1>
        <p>Bespoke Automation Infrastructure & High-Performance Data Architecture for the Modern Enterprise.</p>
        
        <div class="status-grid">
            <div class="stat-item">
                <div class="label">Shield Module</div>
                <div class="value">Lead Acquisition Active</div>
            </div>
            <div class="stat-item">
                <div class="label">Intel Engine</div>
                <div class="value">Municipal Pipeline Live</div>
            </div>
            <div class="stat-item">
                <div class="label">System Status</div>
                <div class="value" style="color: #3fb950;">Operational</div>
            </div>
            <div class="stat-item">
                <div class="label">Architect</div>
                <div class="value">K. Vandenbos</div>
            </div>
        </div>

        <a href="mailto:kalen@nomadik.site" class="btn">Request Access</a>
    </div>
</body>
</html>
